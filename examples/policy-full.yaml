# mcp-policy-guard example policy
# Version: 1
#
# This is a documentation example. Active (uncommented) fields are valid
# against the v0.1 schema (policy-schema.json). Planned features are
# commented out and annotated with their target version.
#
# The schema ships with each release and defines exactly the fields that
# version supports. Unknown fields are rejected on load.
#
#   [v0.1] — P0, available at launch
#   [v0.2] — P1, second release (adds CEL, escalation, rate limits, content filters)
#   [v0.3] — P2, future (adds mutate, time windows, Slack approval, OTel audit)

---

version: 1                              # [v0.1] Required. Must be 1.

# --------------------------------------------------------------------------
# agent_card [v0.1] (optional)
# --------------------------------------------------------------------------
# Path or URL to a FINOS Agent Card. When provided, mcp-policy-guard
# derives baseline rules automatically:
#   - governance.approvedActionList    -> tool allowlist
#   - governance.humanOversightModel   -> default approval requirements
#   - governance.escalationContacts    -> escalation webhooks (v0.2)
#   - agentSecurity.rateLimiting       -> rate limit enablement (v0.2)
#
# Explicit rules in this file override anything derived from the card.
# When agent_card is set, rules are optional (can be derived entirely
# from the card).
# --------------------------------------------------------------------------
agent_card:
  # Exactly one of path, url, or configmap must be set (enforced by schema).
  path: ./agent-card.json
  # url: https://agent.internal/.well-known/agent-card.json
  # configmap: namespace/agent-card-cm       # Kubernetes ConfigMap ref
  watch: true                                 # Re-read on change (file/CM)

# --------------------------------------------------------------------------
# defaults [v0.1]
# --------------------------------------------------------------------------
# Applied to every tool call that doesn't match an explicit rule.
# --------------------------------------------------------------------------
defaults:
  action: deny            # deny | allow | audit_only
  audit: true             # Log every tool call regardless of action
  deny_message: "Tool call not permitted by policy"

# --------------------------------------------------------------------------
# identity [v0.1]
# --------------------------------------------------------------------------
# How mcp-policy-guard identifies the calling agent. Used as the key for
# per-agent rate limiting, audit attribution, and approval routing.
# --------------------------------------------------------------------------
identity:
  # In HTTP mode, extract identity from request headers or JWT claims.
  # In stdio mode, identity is set statically via CLI flag or this block.
  sources:
    - type: jwt_claim           # Extract from Authorization: Bearer <jwt>
      claim: sub                # JWT claim name
      header: Authorization     # Header containing the token
    - type: header              # Extract from a custom header
      header: X-Agent-Id
    - type: client_cert         # Extract from mTLS client certificate
      field: cn                 # cn | san_dns | san_uri
    - type: static              # Fallback for stdio mode
      value: "local-agent"
  # First matching source wins.

# --------------------------------------------------------------------------
# approval [v0.1]
# --------------------------------------------------------------------------
# Global configuration for human-in-the-loop approval.
# Individual rules reference these channels by name.
# --------------------------------------------------------------------------
approval:
  channels:
    - name: terminal
      type: terminal            # [v0.1] Interactive prompt via /dev/tty (Unix only)
      # NOTE: In stdio mode, stdin/stdout carry JSON-RPC. The terminal
      # channel opens /dev/tty directly (like sudo/ssh) to reach the
      # controlling terminal. This only works when:
      #   - Running on Unix (Linux/macOS)
      #   - A controlling terminal exists (not CI, not containers, not bg)
      # Falls back to the named channel if /dev/tty is unavailable.
      show_args: true           # Display tool call arguments in prompt
      show_context: false       # Display surrounding agent context
      fallback: webhook         # Channel name to use if no tty available

    - name: webhook
      type: webhook             # [v0.1] HTTP callback (HTTP mode, Kubernetes)
      endpoint: https://approvals.internal/api/review
      method: POST
      headers:
        Authorization: "Bearer ${APPROVAL_TOKEN}"
      # mcp-policy-guard POSTs the pending request, then polls or waits
      # for a callback to its own /approval/{request_id} endpoint.
      callback_mode: callback   # callback | poll
      poll_interval: 5s         # Only used when callback_mode: poll

    # [v0.3] Slack approval channel (interactive message buttons).
    # - name: slack
    #   type: slack
    #   webhook_url: "${SLACK_APPROVAL_WEBHOOK}"
    #   channel: "#agent-approvals"
    #   callback_url: https://policy-guard.internal/slack/callback

  # Default timeout for all approval holds.
  timeout: 300s                 # Max time to wait for approval
  on_timeout: reject            # reject | allow
  # [v0.2] adds on_timeout: escalate and escalate_on_timeout_to

