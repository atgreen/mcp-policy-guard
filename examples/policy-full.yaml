# --------------------------------------------------------------------------
# audit [v0.1]
# --------------------------------------------------------------------------
# Audit trail configuration. All tool calls matching audit: true are logged.
# --------------------------------------------------------------------------
audit:
  # Multiple outputs supported simultaneously.
  outputs:
    - type: stdout              # [v0.1] Structured JSON to stdout
      format: json              # json | text

    - type: file                # [v0.1] JSONL file with rotation
      path: /var/log/mcp-policy-guard/audit.jsonl
      format: jsonl
      rotate:
        max_size_mb: 100
        max_files: 10

    - type: webhook             # [v0.1] Batched HTTP POST
      endpoint: https://logging.internal/ingest
      method: POST
      headers:
        Authorization: "Bearer ${LOG_TOKEN}"
      batch:
        max_size: 100           # Batch up to 100 events
        flush_interval: 5s      # Or flush every 5s, whichever comes first

    # [v0.3] OpenTelemetry span events
    # - type: otel
    #   endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
    #   protocol: grpc

  # What to include in each audit record.
  include:
    tool_name: true
    tool_arguments: true        # May contain sensitive data — see redaction
    tool_response: true
    agent_identity: true
    timestamp: true
    request_id: true
    policy_decision: true       # allow | deny | held | approved | rejected
    approval_metadata: true     # Who approved, when, latency
    latency: true

  # Redaction rules applied before audit output.
  redaction:
    # Redact specific JSON fields in tool arguments/responses.
    fields:
      - "password"
      - "secret"
      - "api_key"
      - "token"
      - "ssn"
      - "credit_card"
    # Regex patterns to redact from string values.
    patterns:
      - name: credit_card
        regex: '\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b'
        replacement: "[REDACTED:credit_card]"
      - name: ssn
        regex: '\b\d{3}-\d{2}-\d{4}\b'
        replacement: "[REDACTED:ssn]"

# --------------------------------------------------------------------------
# rules [v0.1]
# --------------------------------------------------------------------------
# Ordered list of policy rules. First match wins.
# Each rule matches on tool name (glob) and optionally on agent identity.
#
# v0.1 actions:
#   allow             - Forward the tool call
#   deny              - Reject with error
#   require_approval  - Hold for human approval
#   audit_only        - Forward but flag in audit log
#
# v0.1 match conditions:
#   tools (glob)      - Glob patterns on tool names
#   agent.identity    - Glob pattern on agent identity
#
# Added in later versions:
#   arguments.cel     - [v0.2] CEL expression over tool call arguments
#   escalate          - [v0.2] Fire escalation webhook on match
#   time_window       - [v0.3] Cron-based activation window
#   mutate action     - [v0.3] Modify arguments before forwarding
# --------------------------------------------------------------------------
rules:

  # --- Example 1: Deny all tools not on the approved list ----------------
  # (This is auto-generated when agent_card is set and the card has
  #  governance.approvedActionList. Explicit rules override.)

  # --- Example 2: High-risk tool requires approval -----------------------
  - name: "destructive-db-ops"
    description: "Destructive database operations require human approval"
    match:
      tools:
        - "database.execute_query"
        - "database.drop_*"
        - "database.delete_*"
      # [v0.2] adds CEL match on arguments:
      # arguments:
      #   cel: >
      #     args.sql.matches('(?i)(DELETE|DROP|TRUNCATE|ALTER)')
    action: require_approval
    approval:
      channel: terminal         # Reference to approval.channels[].name
      timeout: 120s
      on_timeout: reject
      message: "Destructive SQL operation detected. Review before proceeding."

  # --- Example 3: Escalation on high-value transactions [v0.2] -----------
  # Uncomment when running v0.2+.
  # - name: "high-value-payment"
  #   description: "Payments over $1M trigger escalation to oncall"
  #   match:
  #     tools:
  #       - "payments.submit"
  #       - "payments.authorize"
  #     arguments:
  #       cel: "double(args.amount) > 1000000.0"
  #   action: allow
  #   escalate:
  #     channel: oncall
  #     trigger_name: "high-value-payment"

  # --- Example 4: Argument mutation [v0.3] --------------------------------
  # - name: "redact-pii-in-logging"
  #   description: "Strip SSNs from log query arguments"
  #   match:
  #     tools:
  #       - "logging.search"
  #   action: mutate
  #   mutate:
  #     arguments:
  #       - op: replace
  #         path: "/query"
  #         cel: 'args.query.replaceAll("\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED]")'

  # --- Example 5: Time-window restriction [v0.3] -------------------------
  # - name: "no-deploys-during-freeze"
  #   description: "Block deployment tools during change freeze"
  #   match:
  #     tools:
  #       - "deploy.*"
  #       - "release.*"
  #     time_window:
  #       active_cron: "0 0 * * 5-0"
  #       timezone: "America/New_York"
  #   action: deny
  #   deny_message: "Deployments blocked during weekend change freeze"

  # --- Example 6: Agent-specific rule [v0.1] -----------------------------
  - name: "restrict-intern-agent"
    description: "Intern agent limited to read-only tools"
    match:
      agent:
        identity: "intern-research-agent"
      tools:
        - "*"
    # Without CEL (v0.1), this denies ALL tools for this agent.
    # To allow read-only tools, add explicit allow rules above this one
    # matching the read/search/list tools for this agent identity.
    action: deny
    deny_message: "This agent is restricted to read-only operations"

  # --- Example 7: Catch-all allow with audit [v0.1] ----------------------
  - name: "default-allow"
    description: "Allow remaining approved tools with full audit"
    match:
      tools:
        - "*"
    action: allow
    audit: true

