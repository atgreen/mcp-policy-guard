# mcp-policy-guard — complete example policy
#
# This file demonstrates all supported fields. See docs/policy-reference.md
# for the full specification.

version: 1

# Derive baseline rules from a FINOS Agent Card (optional).
# agent_card:
#   path: ./agent-card.json
#   watch: true

defaults:
  action: deny
  audit: true
  deny_message: "Tool call not permitted by policy"

identity:
  sources:
    - type: jwt_claim
      claim: sub
      header: Authorization
    - type: header
      header: X-Agent-Id
    - type: static
      value: "local-agent"

approval:
  channels:
    - name: terminal
      type: terminal
      show_args: true
      fallback: webhook

    - name: webhook
      type: webhook
      endpoint: https://approvals.internal/api/review
      method: POST
      headers:
        Authorization: "Bearer ${APPROVAL_TOKEN}"
      callback_mode: callback
      poll_interval: 5s

    - name: slack
      type: slack
      webhook_url: "${SLACK_APPROVAL_WEBHOOK}"
      channel: "#agent-approvals"
      callback_url: https://policy-guard.internal/slack/callback

  timeout: 300s
  on_timeout: reject

  delegation_rules:
    - name: payments-to-finance
      tools: ["payments.*"]
      channel: slack
    - name: deploy-to-ops
      tools: ["deploy.*"]
      channel: webhook

escalation:
  channels:
    - name: oncall
      type: webhook
      endpoint: https://alertmanager.internal/api/v2/alerts
      method: POST
      headers:
        Authorization: "Bearer ${ALERTMANAGER_TOKEN}"
      payload_template: |
        [{
          "labels": {
            "alertname": "AgentEscalation",
            "agent": "${agent}",
            "tool": "${tool}",
            "trigger": "${trigger_name}",
            "severity": "critical"
          }
        }]

    - name: pagerduty
      type: pagerduty
      routing_key: "${PD_ROUTING_KEY}"
      severity: critical

audit:
  outputs:
    - type: stdout
      format: json

    - type: file
      path: /var/log/mcp-policy-guard/audit.jsonl
      format: jsonl
      rotate:
        max_size_mb: 100
        max_files: 10

    - type: webhook
      endpoint: https://logging.internal/ingest
      method: POST
      headers:
        Authorization: "Bearer ${LOG_TOKEN}"
      batch:
        max_size: 100
        flush_interval: 5s

    # - type: otel
    #   endpoint: localhost:4317
    #   protocol: grpc

  include:
    tool_name: true
    tool_arguments: true
    tool_response: true
    agent_identity: true
    timestamp: true
    request_id: true
    policy_decision: true
    approval_metadata: true
    latency: true

  redaction:
    fields:
      - password
      - secret
      - api_key
      - token
    patterns:
      - name: credit_card
        regex: '\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b'
        replacement: "[REDACTED:credit_card]"
      - name: ssn
        regex: '\b\d{3}-\d{2}-\d{4}\b'
        replacement: "[REDACTED:ssn]"

rules:
  # Destructive operations require human approval.
  - name: "destructive-db-ops"
    description: "Destructive database operations require human approval"
    match:
      tools:
        - "database.drop_*"
        - "database.delete_*"
    action: require_approval
    approval:
      channel: terminal
      timeout: 120s
      on_timeout: reject
      message: "Destructive SQL operation detected."

  # High-value transactions trigger escalation but are allowed.
  - name: "high-value-payment"
    description: "Payments over $1M trigger oncall escalation"
    match:
      tools:
        - "payments.submit"
        - "payments.authorize"
      arguments:
        cel: "double(args.amount) > 1000000.0"
    action: allow
    escalate:
      channel: oncall
      trigger_name: "high-value-payment"

  # Inject trace ID into all forwarded calls.
  - name: "inject-trace"
    match:
      tools: ["*"]
    action: mutate
    mutate:
      arguments:
        - op: add
          path: "/policy_guard_trace"
          value: true

  # Block deployments during weekend change freeze.
  - name: "weekend-freeze"
    match:
      tools:
        - "deploy.*"
        - "release.*"
      time_window:
        active_cron: "0 0 * * 6-7"
        timezone: "America/New_York"
    action: deny
    deny_message: "Deployments blocked during weekend change freeze"

  # Restrict intern agents to read-only tools.
  - name: "restrict-intern"
    match:
      agent:
        identity: "intern-*"
      tools: ["*"]
    action: deny
    deny_message: "This agent is restricted to read-only operations"

  # Allow everything else.
  - name: "default-allow"
    match:
      tools: ["*"]
    action: allow
    audit: true

rate_limits:
  - name: "global-limit"
    match:
      tools: ["*"]
    limit:
      requests: 100
      window: 60s
    key: agent
    on_exceed: deny

  - name: "payment-burst"
    match:
      tools: ["payments.*"]
    limit:
      requests: 5
      window: 10s
    key: agent
    on_exceed: deny
    escalate:
      channel: oncall
      trigger_name: "payment-burst"

content_filters:
  - name: "pii-detection"
    direction: request
    match:
      tools: ["*"]
    patterns:
      - name: ssn
        regex: '\b\d{3}-\d{2}-\d{4}\b'
      - name: credit_card
        regex: '\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b'
      - name: email
        regex: '(?i)\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    action: block
    block_message: "PII detected in tool arguments"
    escalate:
      channel: oncall
      trigger_name: "pii-leak-attempt"

  - name: "prompt-injection"
    direction: response
    match:
      tools: ["*"]
    patterns:
      - name: role_override
        regex: '(?i)(ignore previous|you are now|system prompt)'
      - name: instruction_injection
        regex: '(?i)(disregard|override instructions)'
    action: flag
    audit: true
